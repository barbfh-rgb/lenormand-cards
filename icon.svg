      <stop offset="0%" stop-color="#2e164a"/>
      <stop offset="100%" stop-color="#07040f"/>
    </radialGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e6c35c"/>
